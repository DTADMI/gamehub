name: Deploy Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check deploy secrets
        id: deploy_secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing required secret: $key. Skipping deploy steps."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: pnpm/action-setup@v4
        if: ${{ steps.deploy_secrets.outputs.deploy == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.deploy_secrets.outputs.deploy == 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: ${{ steps.deploy_secrets.outputs.deploy == 'true' }}
      - name: Pull Vercel Environment
        if: ${{ steps.deploy_secrets.outputs.deploy == 'true' }}
        run: pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Vercel Artifacts
        if: ${{ steps.deploy_secrets.outputs.deploy == 'true' }}
        run: pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        if: ${{ steps.deploy_secrets.outputs.deploy == 'true' }}
        run: pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

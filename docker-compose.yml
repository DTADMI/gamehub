version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gamehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gamehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamehub_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-gamehub}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gamehub}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamehub-network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: gamehub-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamehub-network

  # NestJS API Backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: gamehub-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-8080}:8080'
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-gamehub}:${POSTGRES_PASSWORD:-gamehub_dev_password}@postgres:5432/${POSTGRES_DB:-gamehub}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gamehub-network
    command: pnpm --filter @gamehub/api dev

  # Next.js Frontend
  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      target: development
    container_name: gamehub-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-nextauth-secret-change-in-production}
    volumes:
      - ./apps/app:/app/apps/app
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/app/node_modules
      - /app/apps/app/.next
    depends_on:
      - api
    networks:
      - gamehub-network
    command: pnpm --filter @gamehub/app dev

volumes:
  postgres_data:
  redis_data:

networks:
  gamehub-network:
    driver: bridge
